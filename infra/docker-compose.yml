version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: corales-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: corales_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio
    container_name: corales-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: corales-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
  minio_data:
